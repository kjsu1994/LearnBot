server:
  port: 8080

spring:
  application:
    name: learnbot
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/learnbot}
    username: ${SPRING_DATASOURCE_USERNAME:learnbot}
    password: ${SPRING_DATASOURCE_PASSWORD:learnbot}
  flyway:
    enabled: true
  servlet:
    multipart:
      max-file-size: ${LEARNBOT_IMPORT_MAX_FILE_SIZE:512MB}
      max-request-size: ${LEARNBOT_IMPORT_MAX_REQUEST_SIZE:512MB}

learnbot:
  crawler:
    allowed-domains: ${LEARNBOT_CRAWLER_ALLOWED_DOMAINS:example.com}
    timeout-seconds: ${LEARNBOT_CRAWLER_TIMEOUT_SECONDS:15}
    rate-limit-millis: ${LEARNBOT_CRAWLER_RATE_LIMIT_MILLIS:500}
    max-pages-per-request: ${LEARNBOT_CRAWLER_MAX_PAGES_PER_REQUEST:30}
    max-depth: ${LEARNBOT_CRAWLER_MAX_DEPTH:2}
    min-content-chars: ${LEARNBOT_CRAWLER_MIN_CONTENT_CHARS:200}
    respect-robots-txt: ${LEARNBOT_CRAWLER_RESPECT_ROBOTS_TXT:true}
    crawl-scope: ${LEARNBOT_CRAWLER_SCOPE:START_PATH}
    robots-failure-policy: ${LEARNBOT_CRAWLER_ROBOTS_FAILURE_POLICY:FAIL_CLOSED}
    include-attachments: ${LEARNBOT_CRAWLER_INCLUDE_ATTACHMENTS:false}
    use-sitemap: ${LEARNBOT_CRAWLER_USE_SITEMAP:false}
    render-mode: ${LEARNBOT_CRAWLER_RENDER_MODE:STATIC}
    max-attachment-bytes: ${LEARNBOT_CRAWLER_MAX_ATTACHMENT_BYTES:25000000}
    playwright-enabled: ${LEARNBOT_CRAWLER_PLAYWRIGHT_ENABLED:false}
    playwright-timeout-seconds: ${LEARNBOT_CRAWLER_PLAYWRIGHT_TIMEOUT_SECONDS:20}
    playwright-wait-until: ${LEARNBOT_CRAWLER_PLAYWRIGHT_WAIT_UNTIL:networkidle}
    playwright-min-static-chars: ${LEARNBOT_CRAWLER_PLAYWRIGHT_MIN_STATIC_CHARS:300}
    recursive-min-content-chars: ${LEARNBOT_CRAWLER_RECURSIVE_MIN_CONTENT_CHARS:450}
    min-text-density: ${LEARNBOT_CRAWLER_MIN_TEXT_DENSITY:0.18}
  chunking:
    size: ${LEARNBOT_CHUNK_SIZE:1200}
    overlap: ${LEARNBOT_CHUNK_OVERLAP:150}
  embedding:
    dimensions: ${LEARNBOT_EMBEDDING_DIMENSIONS:1024}
    batch-size: ${LEARNBOT_EMBEDDING_BATCH_SIZE:64}
    min-batch-size: ${LEARNBOT_EMBEDDING_MIN_BATCH_SIZE:8}
    insert-batch-size: ${LEARNBOT_EMBEDDING_INSERT_BATCH_SIZE:200}
  ollama:
    base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
    chat-model: ${PRIMARY_LLM_MODEL:qwen3:8b-q4_K_M}
    primary-chat-model: ${PRIMARY_LLM_MODEL:qwen3:8b-q4_K_M}
    auxiliary-chat-model: ${AUXILIARY_LLM_MODEL:qwen3.5:2b-q4_K_M}
    embedding-model: ${EMBEDDING_MODEL:${OLLAMA_EMBEDDING_MODEL:bge-m3}}
    temperature: ${LLM_TEMPERATURE:0.2}
    context-window: ${LLM_CONTEXT_WINDOW:${OLLAMA_CONTEXT_LENGTH:4096}}
    max-output-tokens: ${LLM_MAX_OUTPUT_TOKENS:0}
  rag:
    top-k: ${RAG_TOP_K:6}
    pipeline:
      rewrite-enabled: ${RAG_PIPELINE_REWRITE_ENABLED:true}
      self-check-enabled: ${RAG_PIPELINE_SELF_CHECK_ENABLED:true}
      max-iterations: ${RAG_PIPELINE_MAX_ITERATIONS:2}
      rerank-top-n: ${RAG_PIPELINE_RERANK_TOP_N:20}
      document-context-limit: ${RAG_PIPELINE_DOCUMENT_CONTEXT_LIMIT:8}
      code-context-limit: ${RAG_PIPELINE_CODE_CONTEXT_LIMIT:12}
      document-evidence-ranking-enabled: ${RAG_PIPELINE_DOCUMENT_EVIDENCE_RANKING_ENABLED:true}
      document-adjacent-expansion-enabled: ${RAG_PIPELINE_DOCUMENT_ADJACENT_EXPANSION_ENABLED:true}
      document-adjacent-chunk-radius: ${RAG_PIPELINE_DOCUMENT_ADJACENT_CHUNK_RADIUS:1}
      min-top-score: ${RAG_PIPELINE_MIN_TOP_SCORE:0.30}
      min-coverage: ${RAG_PIPELINE_MIN_COVERAGE:0.15}
      default-document-speed-profile: ${RAG_PIPELINE_DEFAULT_DOCUMENT_SPEED_PROFILE:BALANCED}
      query-embedding-cache-enabled: ${RAG_PIPELINE_QUERY_EMBEDDING_CACHE_ENABLED:true}
      query-embedding-cache-max-entries: ${RAG_PIPELINE_QUERY_EMBEDDING_CACHE_MAX_ENTRIES:1024}
      query-embedding-cache-ttl-seconds: ${RAG_PIPELINE_QUERY_EMBEDDING_CACHE_TTL_SECONDS:3600}
      reranker:
        enabled: ${LEARNBOT_RERANKER_ENABLED:false}
        base-url: ${LEARNBOT_RERANKER_BASE_URL:http://localhost:8081}
        top-n: ${LEARNBOT_RERANKER_TOP_N:20}
        timeout-seconds: ${LEARNBOT_RERANKER_TIMEOUT_SECONDS:8}
        failure-backoff-seconds: ${LEARNBOT_RERANKER_FAILURE_BACKOFF_SECONDS:60}
    document-context:
      enabled: ${LEARNBOT_DOCUMENT_CONTEXT_ENABLED:true}
      llm-summary-enabled: ${LEARNBOT_DOCUMENT_CONTEXT_LLM_SUMMARY_ENABLED:true}
      max-source-documents: ${LEARNBOT_DOCUMENT_CONTEXT_MAX_SOURCE_DOCUMENTS:80}
      max-summary-input-chars: ${LEARNBOT_DOCUMENT_CONTEXT_MAX_SUMMARY_INPUT_CHARS:9000}
      map-reduce-enabled: ${LEARNBOT_DOCUMENT_CONTEXT_MAP_REDUCE_ENABLED:true}
      recursive-llm-summary-enabled: ${LEARNBOT_DOCUMENT_CONTEXT_RECURSIVE_LLM_SUMMARY_ENABLED:false}
      recursive-map-reduce-enabled: ${LEARNBOT_DOCUMENT_CONTEXT_RECURSIVE_MAP_REDUCE_ENABLED:false}
      max-map-windows-per-document: ${LEARNBOT_DOCUMENT_CONTEXT_MAX_MAP_WINDOWS_PER_DOCUMENT:8}
      recursive-max-source-documents: ${LEARNBOT_DOCUMENT_CONTEXT_RECURSIVE_MAX_SOURCE_DOCUMENTS:40}
      map-window-chunks: ${LEARNBOT_DOCUMENT_CONTEXT_MAP_WINDOW_CHUNKS:6}
      max-map-input-chars: ${LEARNBOT_DOCUMENT_CONTEXT_MAX_MAP_INPUT_CHARS:7000}
      max-reduce-input-chars: ${LEARNBOT_DOCUMENT_CONTEXT_MAX_REDUCE_INPUT_CHARS:12000}
    overview:
      enabled: ${LEARNBOT_RAG_OVERVIEW_ENABLED:true}
      min-context-chunks: ${LEARNBOT_RAG_OVERVIEW_MIN_CONTEXT_CHUNKS:2}
      min-original-chunks: ${LEARNBOT_RAG_OVERVIEW_MIN_ORIGINAL_CHUNKS:4}
      max-documents: ${LEARNBOT_RAG_OVERVIEW_MAX_DOCUMENTS:12}
      max-code-categories: ${LEARNBOT_RAG_OVERVIEW_MAX_CODE_CATEGORIES:10}
      max-recursive-iterations: ${LEARNBOT_RAG_OVERVIEW_MAX_RECURSIVE_ITERATIONS:2}
  storage:
    endpoint: ${S3_ENDPOINT:http://localhost:9000}
    access-key: ${S3_ACCESS_KEY:learnbot}
    secret-key: ${S3_SECRET_KEY:learnbot1234}
    bucket: ${S3_BUCKET:learnbot-raw}
    region: ${S3_REGION:us-east-1}
  code:
    workspace-path: ${LEARNBOT_CODE_WORKSPACE_PATH:/var/lib/learnbot/repos}
    max-file-bytes: ${LEARNBOT_CODE_MAX_FILE_BYTES:1000000}
    max-files: ${LEARNBOT_CODE_MAX_FILES:5000}
    max-archive-bytes: ${LEARNBOT_CODE_MAX_ARCHIVE_BYTES:512000000}
    max-archive-extracted-bytes: ${LEARNBOT_CODE_MAX_ARCHIVE_EXTRACTED_BYTES:1000000000}
    top-k: ${LEARNBOT_CODE_TOP_K:10}
    index-threads: ${LEARNBOT_CODE_INDEX_THREADS:2}
    credential-secret: ${LEARNBOT_CODE_CREDENTIAL_SECRET:learnbot-local-dev-secret-change-me}
    context:
      enabled: ${LEARNBOT_CODE_CONTEXT_ENABLED:true}
      llm-summary-enabled: ${LEARNBOT_CODE_CONTEXT_LLM_SUMMARY_ENABLED:true}
      max-file-summaries: ${LEARNBOT_CODE_CONTEXT_MAX_FILE_SUMMARIES:1500}
      max-llm-directory-summaries: ${LEARNBOT_CODE_CONTEXT_MAX_LLM_DIRECTORY_SUMMARIES:12}
      max-tree-depth: ${LEARNBOT_CODE_CONTEXT_MAX_TREE_DEPTH:4}
    graph:
      enabled: ${LEARNBOT_CODE_GRAPH_ENABLED:true}
      llm-relation-enabled: ${LEARNBOT_CODE_GRAPH_LLM_RELATION_ENABLED:true}
      roslyn-analyzer-path: ${LEARNBOT_CODE_GRAPH_ROSLYN_ANALYZER_PATH:/app/roslyn/LearnBot.RoslynAnalyzer.dll}
      roslyn-mode: ${LEARNBOT_CODE_GRAPH_ROSLYN_MODE:AUTO}
      roslyn-timeout-seconds: ${LEARNBOT_CODE_GRAPH_ROSLYN_TIMEOUT_SECONDS:120}
      dependency-resolution-enabled: ${LEARNBOT_CODE_GRAPH_DEPENDENCY_RESOLUTION_ENABLED:true}
      dependency-allowed-repositories: ${LEARNBOT_CODE_GRAPH_DEPENDENCY_ALLOWED_REPOSITORIES:https://repo.maven.apache.org/maven2}
      dependency-max-artifacts: ${LEARNBOT_CODE_GRAPH_DEPENDENCY_MAX_ARTIFACTS:256}
      dependency-max-bytes: ${LEARNBOT_CODE_GRAPH_DEPENDENCY_MAX_BYTES:536870912}
      dependency-timeout-seconds: ${LEARNBOT_CODE_GRAPH_DEPENDENCY_TIMEOUT_SECONDS:120}
      max-hop: ${LEARNBOT_CODE_GRAPH_MAX_HOP:2}
      max-expanded-results: ${LEARNBOT_CODE_GRAPH_MAX_EXPANDED_RESULTS:12}
      max-seed-nodes: ${LEARNBOT_CODE_GRAPH_MAX_SEED_NODES:24}
      max-edges-per-node: ${LEARNBOT_CODE_GRAPH_MAX_EDGES_PER_NODE:12}
      max-candidates-per-hop: ${LEARNBOT_CODE_GRAPH_MAX_CANDIDATES_PER_HOP:200}
      max-traversal-rows: ${LEARNBOT_CODE_GRAPH_MAX_TRAVERSAL_ROWS:1000}
      max-llm-files: ${LEARNBOT_CODE_GRAPH_MAX_LLM_FILES:80}
      enrichment-lease-seconds: ${LEARNBOT_CODE_GRAPH_ENRICHMENT_LEASE_SECONDS:300}
      evidence-ranking-enabled: ${LEARNBOT_CODE_GRAPH_EVIDENCE_RANKING_ENABLED:true}
      evidence-ranking-debug: ${LEARNBOT_CODE_GRAPH_EVIDENCE_RANKING_DEBUG:false}
  document:
    index-threads: ${LEARNBOT_DOCUMENT_INDEX_THREADS:2}
    ocr:
      enabled: ${LEARNBOT_DOCUMENT_OCR_ENABLED:false}
      command: ${LEARNBOT_DOCUMENT_OCR_COMMAND:ocrmypdf}
      languages: ${LEARNBOT_DOCUMENT_OCR_LANGS:kor+eng}
      min-text-chars-per-page: ${LEARNBOT_DOCUMENT_OCR_MIN_TEXT_CHARS_PER_PAGE:80}
      max-pages: ${LEARNBOT_DOCUMENT_OCR_MAX_PAGES:80}
      timeout-seconds: ${LEARNBOT_DOCUMENT_OCR_TIMEOUT_SECONDS:180}
    graph:
      enabled: ${LEARNBOT_DOCUMENT_GRAPH_ENABLED:false}
      max-hop: ${LEARNBOT_DOCUMENT_GRAPH_MAX_HOP:1}
      max-expanded-results: ${LEARNBOT_DOCUMENT_GRAPH_MAX_EXPANDED_RESULTS:12}
      debug: ${LEARNBOT_DOCUMENT_GRAPH_DEBUG:false}
    preview:
      office-render-enabled: ${LEARNBOT_DOCUMENT_PREVIEW_OFFICE_RENDER_ENABLED:false}
      office-command: ${LEARNBOT_DOCUMENT_PREVIEW_OFFICE_COMMAND:soffice}
      office-timeout-seconds: ${LEARNBOT_DOCUMENT_PREVIEW_OFFICE_TIMEOUT_SECONDS:45}
      office-max-file-bytes: ${LEARNBOT_DOCUMENT_PREVIEW_OFFICE_MAX_FILE_BYTES:100000000}
  auth:
    bootstrap-admin-email: ${LEARNBOT_BOOTSTRAP_ADMIN_EMAIL:jinsu.kim}
    bootstrap-admin-password: ${LEARNBOT_BOOTSTRAP_ADMIN_PASSWORD:admin1234}
    bootstrap-admin-name: ${LEARNBOT_BOOTSTRAP_ADMIN_NAME:런봇 Admin}
    session-hours: ${LEARNBOT_SESSION_HOURS:12}
  transfer:
    export-dir: ${LEARNBOT_EXPORT_DIR:export}
