x-timezone-env: &timezone-env
  TZ: Asia/Seoul
  JAVA_TOOL_OPTIONS: -Duser.timezone=Asia/Seoul

x-default-logging: &default-logging
  driver: json-file
  options:
    max-size: ${LEARNBOT_DOCKER_LOG_MAX_SIZE:-50m}
    max-file: ${LEARNBOT_DOCKER_LOG_MAX_FILE:-7}

services:
  cloudflare-tunnel:
    container_name: learnbot-cloudflared-tunnel
    image: cloudflare/cloudflared:latest
    profiles:
      - cloudflare
    restart: unless-stopped
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN:-}
    command: tunnel run
    depends_on:
      - nginx
    logging: *default-logging

  minio:
    image: minio/minio
    container_name: learnbot-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "127.0.0.1:19000:9000"
      - "127.0.0.1:19001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-learnbot}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-learnbot1234}
    volumes:
      - minio-data:/data
    logging: *default-logging

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    image: learnbot-nginx:latest
    container_name: learnbot-nginx
    restart: unless-stopped
    ports:
      - "8083:80"
    volumes:
      - ./frontend/dist:/usr/share/nginx/client:ro
    depends_on:
      backend:
        condition: service_started
    logging: *default-logging

  postgres:
    image: pgvector/pgvector:pg16
    container_name: learnbot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: learnbot
      POSTGRES_USER: learnbot
      POSTGRES_PASSWORD: learnbot
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U learnbot -d learnbot"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  ollama:
    image: ollama/ollama:latest
    container_name: learnbot-ollama
    restart: unless-stopped
    environment:
      OLLAMA_CONTEXT_LENGTH: ${OLLAMA_CONTEXT_LENGTH:-4096}
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:-5m}
      OLLAMA_MAX_LOADED_MODELS: ${OLLAMA_MAX_LOADED_MODELS:-1}
      OLLAMA_NUM_PARALLEL: ${OLLAMA_NUM_PARALLEL:-1}
    ports:
      - "127.0.0.1:11436:11434"
    volumes:
      - ollama-data:/root/.ollama
    logging: *default-logging

  ollama-pull:
    image: ollama/ollama:latest
    container_name: learnbot-ollama-pull
    environment:
      OLLAMA_HOST: http://ollama:11434
      PRIMARY_LLM_MODEL: ${PRIMARY_LLM_MODEL:-qwen3:8b-q4_K_M}
      AUXILIARY_LLM_MODEL: ${AUXILIARY_LLM_MODEL:-qwen3.5:2b-q4_K_M}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-bge-m3}
    depends_on:
      - ollama
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "sleep 5 &&
       ollama pull \"$${AUXILIARY_LLM_MODEL}\" &&
       (ollama pull \"$${PRIMARY_LLM_MODEL}\" || echo \"Optional primary LLM pull failed: $${PRIMARY_LLM_MODEL}\") &&
       ollama pull \"$${EMBEDDING_MODEL}\" &&
       ollama list"
    logging: *default-logging

  redis:
    image: redis:7
    container_name: learnbot-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6380:6379"
    logging: *default-logging

  backend:
    container_name: learnbot-backend
    build:
      context: ./backend
      args:
        INSTALL_OFFICE: ${LEARNBOT_BACKEND_INSTALL_OFFICE:-false}
        INSTALL_CRAWLER_TOOLS: ${LEARNBOT_BACKEND_INSTALL_CRAWLER_TOOLS:-false}
    restart: on-failure
    environment:
      <<: *timezone-env
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/learnbot
      SPRING_DATASOURCE_USERNAME: learnbot
      SPRING_DATASOURCE_PASSWORD: learnbot
      OLLAMA_BASE_URL: http://ollama:11434
      PRIMARY_LLM_MODEL: ${PRIMARY_LLM_MODEL:-qwen3:8b-q4_K_M}
      AUXILIARY_LLM_MODEL: ${AUXILIARY_LLM_MODEL:-qwen3.5:2b-q4_K_M}
      LLM_CONTEXT_WINDOW: ${LLM_CONTEXT_WINDOW:-4096}
      LLM_MAX_OUTPUT_TOKENS: ${LLM_MAX_OUTPUT_TOKENS:-0}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-bge-m3}
      OLLAMA_EMBEDDING_MODEL: ${OLLAMA_EMBEDDING_MODEL:-bge-m3}
      LEARNBOT_EMBEDDING_DIMENSIONS: ${LEARNBOT_EMBEDDING_DIMENSIONS:-1024}
      LEARNBOT_EMBEDDING_BATCH_SIZE: ${LEARNBOT_EMBEDDING_BATCH_SIZE:-64}
      LEARNBOT_EMBEDDING_MIN_BATCH_SIZE: ${LEARNBOT_EMBEDDING_MIN_BATCH_SIZE:-8}
      LEARNBOT_EMBEDDING_INSERT_BATCH_SIZE: ${LEARNBOT_EMBEDDING_INSERT_BATCH_SIZE:-200}
      LEARNBOT_DOCUMENT_INDEX_THREADS: ${LEARNBOT_DOCUMENT_INDEX_THREADS:-2}
      LEARNBOT_RAG_OVERVIEW_ENABLED: ${LEARNBOT_RAG_OVERVIEW_ENABLED:-true}
      LEARNBOT_RAG_OVERVIEW_MIN_CONTEXT_CHUNKS: ${LEARNBOT_RAG_OVERVIEW_MIN_CONTEXT_CHUNKS:-2}
      LEARNBOT_RAG_OVERVIEW_MIN_ORIGINAL_CHUNKS: ${LEARNBOT_RAG_OVERVIEW_MIN_ORIGINAL_CHUNKS:-4}
      LEARNBOT_RAG_OVERVIEW_MAX_DOCUMENTS: ${LEARNBOT_RAG_OVERVIEW_MAX_DOCUMENTS:-12}
      LEARNBOT_RAG_OVERVIEW_MAX_CODE_CATEGORIES: ${LEARNBOT_RAG_OVERVIEW_MAX_CODE_CATEGORIES:-10}
      LEARNBOT_RAG_OVERVIEW_MAX_RECURSIVE_ITERATIONS: ${LEARNBOT_RAG_OVERVIEW_MAX_RECURSIVE_ITERATIONS:-2}
      LEARNBOT_CRAWLER_ALLOWED_DOMAINS: ${LEARNBOT_CRAWLER_ALLOWED_DOMAINS:-example.com,docs.spring.io,ollama.com}
      LEARNBOT_CRAWLER_MAX_PAGES_PER_REQUEST: ${LEARNBOT_CRAWLER_MAX_PAGES_PER_REQUEST:-30}
      LEARNBOT_CRAWLER_MAX_DEPTH: ${LEARNBOT_CRAWLER_MAX_DEPTH:-2}
      LEARNBOT_CRAWLER_MIN_CONTENT_CHARS: ${LEARNBOT_CRAWLER_MIN_CONTENT_CHARS:-200}
      LEARNBOT_CRAWLER_RATE_LIMIT_MILLIS: ${LEARNBOT_CRAWLER_RATE_LIMIT_MILLIS:-500}
      LEARNBOT_CRAWLER_PLAYWRIGHT_ENABLED: ${LEARNBOT_CRAWLER_PLAYWRIGHT_ENABLED:-false}
      LEARNBOT_RERANKER_ENABLED: ${LEARNBOT_RERANKER_ENABLED:-false}
      LEARNBOT_RERANKER_BASE_URL: ${LEARNBOT_RERANKER_BASE_URL:-http://reranker:8081}
      LEARNBOT_DOCUMENT_OCR_ENABLED: ${LEARNBOT_DOCUMENT_OCR_ENABLED:-false}
      LEARNBOT_DOCUMENT_PREVIEW_OFFICE_RENDER_ENABLED: ${LEARNBOT_DOCUMENT_PREVIEW_OFFICE_RENDER_ENABLED:-false}
      LEARNBOT_CODE_CREDENTIAL_SECRET: ${LEARNBOT_CODE_CREDENTIAL_SECRET:-learnbot-local-dev-secret-change-me}
      SPRING_DATA_REDIS_HOST: ${SPRING_DATA_REDIS_HOST:-redis}
      SPRING_DATA_REDIS_PORT: ${SPRING_DATA_REDIS_PORT:-6379}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-learnbot}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-learnbot1234}
      S3_BUCKET: ${S3_BUCKET:-learnbot-raw}
      LEARNBOT_CODE_WORKSPACE_PATH: /var/lib/learnbot/repos
      LEARNBOT_EXPORT_DIR: /var/lib/learnbot/export
      LEARNBOT_RETENTION_ENABLED: ${LEARNBOT_RETENTION_ENABLED:-true}
      LEARNBOT_RETENTION_DRY_RUN: ${LEARNBOT_RETENTION_DRY_RUN:-false}
      LEARNBOT_RETENTION_OPERATION_LOG_DAYS: ${LEARNBOT_RETENTION_OPERATION_LOG_DAYS:-14}
      LEARNBOT_RETENTION_AUDIT_LOG_DAYS: ${LEARNBOT_RETENTION_AUDIT_LOG_DAYS:-180}
      LEARNBOT_RETENTION_EXPORT_DAYS: ${LEARNBOT_RETENTION_EXPORT_DAYS:-14}
      LEARNBOT_RETENTION_ORPHAN_GRACE_DAYS: ${LEARNBOT_RETENTION_ORPHAN_GRACE_DAYS:-7}
      LEARNBOT_RETENTION_DEPENDENCY_CACHE_DAYS: ${LEARNBOT_RETENTION_DEPENDENCY_CACHE_DAYS:-14}
      LEARNBOT_BOOTSTRAP_ADMIN_EMAIL: ${LEARNBOT_BOOTSTRAP_ADMIN_EMAIL:-jinsu.kim}
      LEARNBOT_BOOTSTRAP_ADMIN_PASSWORD: ${LEARNBOT_BOOTSTRAP_ADMIN_PASSWORD:-admin1234}
      LEARNBOT_BOOTSTRAP_ADMIN_NAME: ${LEARNBOT_BOOTSTRAP_ADMIN_NAME:-런봇 Admin}
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
      ollama-pull:
        condition: service_completed_successfully
      redis:
        condition: service_started
      minio:
        condition: service_started
    volumes:
      - code-repos:/var/lib/learnbot/repos
      - ./export:/var/lib/learnbot/export
    logging: *default-logging

volumes:
  postgres-data:
  ollama-data:
  minio-data:
  code-repos:
